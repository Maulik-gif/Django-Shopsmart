{% extends 'shop/master.html' %}

{% block body %}
<div class="container my-5">
    <div class="card shadow border-0 rounded-4 overflow-hidden">
        <div class="row g-0">

            <div class="col-md-5 bg-light d-flex align-items-center justify-content-center p-4">
                <img src="{{ product.image.url }}" class="img-fluid object-fit-contain" alt="{{ product.product_name }}"
                    style="max-height: 450px;">
            </div>

            <div class="col-md-7">
                <div class="card-body p-5">
                    <span class="badge bg-secondary mb-2">Shop Smart Assured</span>

                    <h2 class="card-title fw-bold text-dark mb-3" id="namepr{{product.id}}">{{ product.product_name }}</h2>

                    <h3 class="text-success fw-bold mb-4" >₹<span id="pricepr{{product.id}}">{{ product.price }}</span><span class="fs-6 text-muted fw-normal align-middle">Inclusive of all taxes</span></h3>

                    <p class="card-text text-secondary mb-4" style="line-height: 1.8;">
                        {{ product.description }}
                    </p>

                    <div class="d-grid gap-3 d-md-flex justify-content-md-start">
                        <span id="divpr{{product.id}}" class="divpr">
                            <button type="button" id="pr{{product.id}}"
                                class="cart btn btn-success btn-lg px-4 shadow-sm rounded-pill fw-bold">
                                🛒 Add To Cart
                            </button>
                        </span>
                        <a href="/shop/" class="btn btn-dark btn-lg px-4 shadow-sm rounded-pill fw-bold">
                            ← Back to home
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
    var myallowlist = bootstrap.Tooltip.Default.allowList;
    myallowlist.button = ['id', 'class', 'type', 'onclick'];
    //Find out cart items from localStorage
    if (localStorage.getItem('cart') == null) {
        var cart = {};
    } else {
        cart = JSON.parse(localStorage.getItem('cart'));
        totalItems = 0;
        for (let value of Object.values(cart)) {
            totalItems = totalItems + value[0];
        }
        document.getElementById('cart').innerHTML = totalItems;
        updateCart(cart);
    }
    $(document).on('click', 'button.cart', function () {
        var id_string = this.id.toString();
        if (cart[id_string] != undefined) {
            qty = cart[id_string][0] + 1;
            cart[id_string] = [qty];
        } else {
            qty = 1;
            name = document.getElementById('name' + id_string).innerHTML;
            price = document.getElementById('price' + id_string).innerHTML;
            cart[id_string] = [qty, name, price];
            console.log(cart);
        }
        updateCart(cart);
    });

    //Add popcart to cart
    updatePopover(cart);

    function updatePopover(cart) {
        var popStr = "";
        popStr = popStr + "<h5>Cart for your Shopping</h5> <div class='mx-2 my-2'>";
        var i = 1;
        for (var item in cart) {
            popStr = popStr + "<b>" + i + "</b>. ";
            popStr = popStr + cart[item][1].slice(0, 20) + "... Qty : " + cart[item][0] + "<br>";
            i = i + 1;
        }
        popStr = popStr + "</div> <a class='btn btn-success mx-1' href='/shop/checkout'>Checkout</a><button class='btn btn-danger mx-1' onclick='clearCart()' type='button'>Clear Cart</button>";

        var exampleEl = document.getElementById('popcart')

        var existingpopover = bootstrap.Popover.getInstance(exampleEl);

        if (existingpopover) {
            existingpopover.dispose();
        }
        exampleEl.setAttribute("data-bs-content", popStr);
        var popover = new bootstrap.Popover(exampleEl);
        popover.show();
    }

    function clearCart() {
        cart = JSON.parse(localStorage.getItem('cart'));
        for (var item in cart) {
            document.getElementById('div' + item).innerHTML = "<button id='" + item + "' class='cart btn btn-success btn-lg px-4 shadow-sm rounded-pill fw-bold' id='pr{{product.id}}'>🛒 Add To Cart</button>";
        }
        localStorage.clear();
        cart = {};
        updateCart(cart);

    }
    function updateCart(cart) {
        for (var item in cart) {
            let divElement = document.getElementById('div' + item);
            
            if (divElement) {
                if (cart[item][0] > 0) {
                    document.getElementById('div' + item).innerHTML = "<button id='minus" + item + "' class='btn btn-danger minus mx-1'>-</button> <span id = 'val" + item + "'>" + cart[item][0] + " </span> <button id='plus" + item + "' class='btn btn-success plus mx-1'>+</button>";
                } else {
                    document.getElementById('div' + item).innerHTML = "<button id='" + item + "' class='btn btn-success cart'>Add To Cart</button>";
                    delete cart[item];
                }
            }else if (cart[item][0] <= 0) {
                delete cart[item];
            }
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        totalItems = 0;
        for (let value of Object.values(cart)) {
            totalItems = totalItems + value[0];
        }
        document.getElementById('cart').innerHTML = totalItems;
        updatePopover(cart);
    }

    $('.divpr').on("click", "button.minus", function () {
        a = this.id.slice(5,);
        cart[a][0] = cart[a][0] - 1;
        cart[a][0] = Math.max(0, cart[a][0]);
        document.getElementById('val' + a).innerHTML = cart[a][0];
        updateCart(cart);
    });

    $('.divpr').on("click", "button.plus", function () {
        a = this.id.slice(4,);
        cart[a][0] = cart[a][0] + 1;
        document.getElementById('val' + a).innerHTML = cart[a][0];
        updateCart(cart);
    });
</script>
{% endblock %}
