<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>ShopSmart</title>
    <style>
        {% block css %}

        {% endblock %}
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3" style="background-color: #1a1e21;">
        <div class="container">
            <a class="navbar-brand fw-bolder fs-3" href="/">
                <span class="text-info">Shop</span><span class="text-success">Smart</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 fw-semibold">
                    <li class="nav-item mx-1">
                        <a class="nav-link active" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item mx-1">
                        <a class="nav-link" href="/shop/about">About Us</a>
                    </li>
                    <li class="nav-item mx-1">
                        <a class="nav-link" href="/shop/contact">Contact Us</a>
                    </li>
                    <li class="nav-item mx-1">
                        <a class="nav-link" href="/blog">Blog</a>
                    </li>
                    <li class="nav-item mx-1">
                        <a class="nav-link" href="/shop/tracker">Tracking Status</a>
                    </li>
                </ul>

                <form class="d-flex ms-lg-3" method="get" action="/shop/search">
                    <input class="form-control rounded-pill border-0 px-4 shadow-sm" type="search"
                        placeholder="Search products..." aria-label="Search" name="search" id="search">
                    <button class="btn btn-success rounded-pill px-4 ms-2 shadow-sm fw-bold"
                        type="submit">Search</button>
                </form>

                <button type="button"
                    class="btn btn-light rounded-pill px-4 shadow-sm ms-lg-3 mt-3 mt-lg-0 fw-bold text-dark d-flex align-items-center justify-content-center"
                    id="popcart" data-bs-container="body" data-bs-toggle="popover" data-bs-placement="bottom"
                    data-bs-content="Cart" data-bs-html="true">
                    🛒 Cart
                    <span class="badge bg-danger rounded-circle ms-2" id="cart" style="font-size: 0.85rem;">0</span>
                </button>
            </div>
        </div>
    </nav>
    {% block body %} {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    {% block js %} {% endblock %}
</body>

</html>
